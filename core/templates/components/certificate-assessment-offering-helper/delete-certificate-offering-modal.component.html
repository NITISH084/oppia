<div class="modal-header">
  <h4 class="modal-title">Delete Certificate</h4>
</div>

<div class="modal-body">
  <span>Do you want to delete this certificate? Once deleted, <b>it cannot be recovered.</b></span>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
  <button type="button" class="btn btn-danger" (click)="confirm()">Delete Certificate</button>
</div>
