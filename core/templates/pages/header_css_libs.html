<!-- NOTE: Please contact @vojtechjelinek or @srijanreddy98 before modifying the file.
     This is to ensure that all footer/header libs are properly synced across these five files:
     index.html, index.prod.html, header_css_libs.html, header_js_libs.html and footer_js_libs.html-->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://storage.googleapis.com" crossorigin>

<link rel="preload"
      media="screen"
      href="https://fonts.googleapis.com/css2?family=Capriola&family=Roboto:wght@400;500;700&family=Noto+Serif:ital@0;1&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'">
<link rel="preload"
      media="screen"
      href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'">

<!-- Angular CLI global styles (Bootstrap, Font Awesome, oppia.css, oppia-material.css, toastr). -->
<!-- Production placeholders are rewritten to hashed styles/vendor-styles filenames in scripts/build.py. -->
<% if (webpackConfig.mode === 'production') { %>
  <link rel="stylesheet" type="text/css" href="/dist/oppia-angular-prod/vendor-styles.css">
  <link rel="stylesheet" type="text/css" href="/dist/oppia-angular-prod/styles.css">
<% } else { %>
  <link rel="stylesheet" type="text/css" href="/dist/oppia-angular/vendor-styles.css">
  <link rel="stylesheet" type="text/css" href="/dist/oppia-angular/styles.css">
<% } %>
